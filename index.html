<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="Inklish: a calm English learning page for toddlers on e-ink readers."
    />
    <title>Inklish - Toddler English</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <dialog class="guide panel" id="guide" aria-labelledby="guide-title">
      <div class="guide-layout">
        <div>
          <p class="eyebrow">Inklish</p>
          <h1 id="guide-title">每天三个小英文</h1>
          <p class="intro">
            给 2-3 岁孩子的慢节奏英语启蒙：大图、大字、少干扰。
          </p>
        </div>
        <div class="daily-mark" aria-hidden="true">
          <span>3</span>
          <small>words</small>
        </div>
      </div>

      <section class="guide-steps" aria-labelledby="guide-steps-title">
        <p class="eyebrow">For parents</p>
        <h2 id="guide-steps-title">陪伴玩法</h2>
        <ol class="parent-steps">
          <li>家长先指图，让孩子观察轮廓和动作。</li>
          <li>家长按页面提示慢慢读一句英文。</li>
          <li>孩子愿意时，只模仿最后一个词即可。</li>
        </ol>
      </section>

      <button class="button primary guide-start" id="start-button" type="button">
        开始学习
      </button>
    </dialog>

    <main class="app-shell" aria-labelledby="app-title">
      <header class="compact-header">
        <div>
          <p class="eyebrow">Inklish</p>
          <h1 id="app-title">Today</h1>
        </div>
        <button class="text-button" id="guide-button" type="button">
          玩法
        </button>
      </header>

      <section class="learning-card panel" aria-live="polite">
        <div class="day-switcher" aria-label="day navigation">
          <button class="day-button" id="prev-day-button" type="button">
            昨天
          </button>
          <span id="day-label">今天</span>
          <button class="day-button" id="next-day-button" type="button">
            明天
          </button>
        </div>

        <div class="card-topline">
          <span id="lesson-counter">1 / 3</span>
          <span id="lesson-theme">Animal</span>
        </div>

        <div class="picture-frame" id="picture-frame" aria-hidden="true"></div>

        <div class="word-block">
          <p class="tiny-label">Look and point</p>
          <h2 id="word">Cat</h2>
          <p id="pronunciation" class="pronunciation">/kæt/</p>
          <p id="meaning" class="meaning">小猫</p>
          <p id="parent-cue" class="parent-cue">家长慢读：This is a cat.</p>
        </div>

        <div class="actions" aria-label="learning actions">
          <button class="button" id="prev-button" type="button">
            上一个
          </button>
          <button class="button primary" id="next-button" type="button">
            下一个
          </button>
        </div>
      </section>
    </main>

    <script src="app.js" defer></script>
  </body>
</html>
