<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="Inklish: a calm English learning page for toddlers on e-ink readers."
    />
    <title>Inklish - Toddler English</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app-shell" aria-labelledby="app-title">
      <section class="hero panel">
        <div>
          <p class="eyebrow">Inklish</p>
          <h1 id="app-title">每天三个小英文</h1>
          <p class="intro">
            给 2-3 岁孩子的慢节奏英语启蒙：大图、大字、短声音、少干扰。
          </p>
        </div>
        <div class="daily-mark" aria-hidden="true">
          <span>3</span>
          <small>words</small>
        </div>
      </section>

      <section class="learning-card panel" aria-live="polite">
        <div class="card-topline">
          <span id="lesson-counter">1 / 3</span>
          <span id="lesson-theme">Animal</span>
        </div>

        <div class="picture-frame" id="picture-frame" aria-hidden="true"></div>

        <div class="word-block">
          <p class="tiny-label">Look and point</p>
          <h2 id="word">Cat</h2>
          <p id="pronunciation" class="pronunciation">/kat/</p>
          <p id="meaning" class="meaning">小猫</p>
          <p id="parent-cue" class="parent-cue">家长慢读：This is a cat.</p>
        </div>

        <div class="actions" aria-label="learning actions">
          <button class="button" id="prev-button" type="button">
            上一个
          </button>
          <button class="button primary" id="next-button" type="button">
            下一个
          </button>
          <button class="button" id="done-button" type="button">
            今天完成
          </button>
        </div>
      </section>

      <section class="parent-panel panel" aria-labelledby="parent-title">
        <div>
          <p class="eyebrow">For parents</p>
          <h2 id="parent-title">陪伴玩法</h2>
        </div>
        <ol class="parent-steps">
          <li>家长先指图，让孩子观察轮廓和动作。</li>
          <li>家长按页面提示慢慢读一句英文。</li>
          <li>孩子愿意时，只模仿最后一个词即可。</li>
        </ol>
      </section>
    </main>

    <script src="app.js" defer></script>
  </body>
</html>
